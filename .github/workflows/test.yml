name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
    
    - name: Test with pytest
      run: |
        pytest test_*.py -v --cov=yesterwind_zmodem --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: pip install pytest pytest-cov
    
    - name: Check coverage
      run: |
        pytest test_*.py -v --cov=yesterwind_zmodem --cov-report=term-missing
        COVERAGE=$(pytest --cov=yesterwind_zmodem --cov-report=term-missing 2>&1 | grep "TOTAL" | awk '{print $4}' | tr -d '%')
        if [ "$COVERAGE" -lt 100 ]; then
          echo "Coverage is $COVERAGE%, below 100%"
          exit 1
        fi